apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: cmdclaw-coworker-builder-success
  namespace: cmdclaw
  labels:
    pyrra.dev/team: product
    pyrra.dev/service: cmdclaw
    pyrra.dev/journey: coworker_builder
spec:
  target: "95"
  window: 30d
  description: Coworker builder conversation generation success rate.
  indicator:
    ratio:
      errors:
        metric: cmdclaw_slo_events_total{journey="coworker_builder",result="bad"}
      total:
        metric: cmdclaw_slo_events_total{journey="coworker_builder"}
  alerting:
    disabled: true
    absent: false
