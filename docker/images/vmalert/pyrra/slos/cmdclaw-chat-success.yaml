apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: cmdclaw-chat-success
  namespace: cmdclaw
  labels:
    pyrra.dev/team: product
    pyrra.dev/service: cmdclaw
    pyrra.dev/journey: chat
spec:
  target: "95"
  window: 30d
  description: Ordinary chat generation success rate.
  indicator:
    ratio:
      errors:
        metric: cmdclaw_slo_events_total{journey="chat",result="bad"}
      total:
        metric: cmdclaw_slo_events_total{journey="chat"}
  alerting:
    disabled: true
    absent: false
