apiVersion: pyrra.dev/v1alpha1
kind: ServiceLevelObjective
metadata:
  name: cmdclaw-coworker-run-success
  namespace: cmdclaw
  labels:
    pyrra.dev/team: product
    pyrra.dev/service: cmdclaw
    pyrra.dev/journey: coworker_run
spec:
  target: "95"
  window: 30d
  description: Individual coworker run success rate.
  indicator:
    ratio:
      errors:
        metric: cmdclaw_slo_events_total{journey="coworker_run",result="bad"}
      total:
        metric: cmdclaw_slo_events_total{journey="coworker_run"}
  alerting:
    disabled: true
    absent: false
