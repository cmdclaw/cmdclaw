global:
  resolve_timeout: 5m
  slack_api_url_file: /etc/alertmanager/secrets/slack_webhook_url

route:
  receiver: slack-local
  group_by:
    - alertname
    - service_name
    - queue
  group_wait: 30s
  group_interval: 10m
  repeat_interval: 4h

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - alertname
      - service_name
      - queue

receivers:
  - name: slack-local
    slack_configs:
      - send_resolved: true
        username: CmdClaw Local
        icon_emoji: ":rotating_light:"
        title: >-
          [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}
        text: >-
          {{ range .Alerts -}}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ if .Labels.service_name }}*Service:* {{ .Labels.service_name }}{{ end }}
          {{ if .Labels.queue }}*Queue:* {{ .Labels.queue }}{{ end }}
          {{ if .Annotations.dashboard_url }}*Dashboard:* {{ .Annotations.dashboard_url }}{{ end }}

          {{ end -}}
