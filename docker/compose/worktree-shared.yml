name: ${CMDCLAW_SHARED_COMPOSE_PROJECT:-cmdclaw-shared}

services:
  database:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-${DB_PASSWORD:-postgres}}
      POSTGRES_DB: cmdclaw
    ports:
      - "${CMDCLAW_POSTGRES_PORT:-5433}:5432"
    volumes:
      - cmdclaw_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    environment:
      CMDCLAW_SHARED_REDIS_ADMIN_PASSWORD: ${CMDCLAW_SHARED_REDIS_ADMIN_PASSWORD:-cmdclaw-redis-admin}
    command:
      - redis-server
      - --requirepass
      - ${CMDCLAW_SHARED_REDIS_ADMIN_PASSWORD:-cmdclaw-redis-admin}
    ports:
      - "${CMDCLAW_REDIS_PORT:-6380}:6379"
    volumes:
      - cmdclaw_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$${CMDCLAW_SHARED_REDIS_ADMIN_PASSWORD:-cmdclaw-redis-admin}\" ping",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-${S3_ACCESS_KEY_ID:-minioadmin}}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-${S3_SECRET_ACCESS_KEY:-minioadmin}}
    ports:
      - "${CMDCLAW_MINIO_API_PORT:-9100}:9000"
      - "${CMDCLAW_MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - cmdclaw_minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  alertmanager:
    image: prom/alertmanager:v0.32.0
    entrypoint:
      - /bin/sh
      - -c
      - |
          mkdir -p /etc/alertmanager/secrets
          if [ -n "$${SLACK_BOT_TOKEN:-}" ]; then
            printf '%s' "$${SLACK_BOT_TOKEN}" > /etc/alertmanager/secrets/slack_bot_token
          else
            : > /etc/alertmanager/secrets/slack_bot_token
          fi
          exec /bin/alertmanager \
            --config.file=/etc/alertmanager/alertmanager.yml \
            --storage.path=/alertmanager \
            --web.listen-address=:9093
    environment:
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
    ports:
      - "${CMDCLAW_ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - cmdclaw_alertmanager_data:/alertmanager
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.1.7
    environment:
      GF_SECURITY_ADMIN_USER: ${CMDCLAW_GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${CMDCLAW_GRAFANA_ADMIN_PASSWORD:-admin}
      GF_PLUGINS_PREINSTALL_SYNC: victoriametrics-logs-datasource
    ports:
      - "${CMDCLAW_GRAFANA_PORT:-3400}:3000"
    volumes:
      - cmdclaw_grafana_data:/var/lib/grafana
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - alertmanager
    restart: unless-stopped

volumes:
  cmdclaw_postgres_data:
    name: ${CMDCLAW_POSTGRES_VOLUME:-cmdclaw-shared_postgres_data}
  cmdclaw_redis_data:
    name: ${CMDCLAW_REDIS_VOLUME:-cmdclaw-shared_redis_data}
  cmdclaw_minio_data:
    name: ${CMDCLAW_MINIO_VOLUME:-cmdclaw-shared_minio_data}
  cmdclaw_alertmanager_data:
    name: ${CMDCLAW_ALERTMANAGER_VOLUME:-cmdclaw-shared_alertmanager_data}
  cmdclaw_grafana_data:
    name: ${CMDCLAW_GRAFANA_VOLUME:-cmdclaw-shared_grafana_data}
