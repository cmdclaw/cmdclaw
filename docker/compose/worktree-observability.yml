name: ${CMDCLAW_COMPOSE_PROJECT:-cmdclaw-local}

services:
  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.140.0
    command:
      - "--storageDataPath=/victoria-metrics-data"
      - "--vmalert.proxyURL=http://vmalert:8880"
    ports:
      - "${CMDCLAW_VICTORIA_METRICS_PORT:-8428}:8428"
    volumes:
      - cmdclaw_victoria_metrics_data:/victoria-metrics-data
    restart: unless-stopped

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.48.0
    command:
      - "--storageDataPath=/victoria-logs-data"
    ports:
      - "${CMDCLAW_VICTORIA_LOGS_PORT:-9428}:9428"
    volumes:
      - cmdclaw_victoria_logs_data:/victoria-logs-data
    restart: unless-stopped

  victoria-traces:
    image: victoriametrics/victoria-traces:v0.8.0
    command:
      - "--storageDataPath=/victoria-traces-data"
    ports:
      - "${CMDCLAW_VICTORIA_TRACES_PORT:-10428}:10428"
    volumes:
      - cmdclaw_victoria_traces_data:/victoria-traces-data
    restart: unless-stopped

  vector:
    image: timberio/vector:0.54.0-alpine
    command:
      - "--config"
      - "/etc/vector/vector.yaml"
    ports:
      - "${CMDCLAW_VECTOR_OTLP_GRPC_PORT:-4317}:4317"
      - "${CMDCLAW_VECTOR_OTLP_HTTP_PORT:-4318}:4318"
      - "${CMDCLAW_VECTOR_TRACES_PORT:-5318}:5318"
      - "${CMDCLAW_VECTOR_LOG_PORT:-8686}:8686"
    volumes:
      - ./observability/vector.yaml:/etc/vector/vector.yaml:ro
    depends_on:
      - victoria-metrics
      - victoria-logs
      - victoria-traces
    restart: unless-stopped

  vmalert:
    image: victoriametrics/vmalert:v1.140.0
    command:
      - "-rule=/etc/vmalert/rules/*.yml"
      - "-datasource.url=http://victoria-metrics:8428"
      - "-remoteWrite.url=http://victoria-metrics:8428"
      - "-remoteRead.url=http://victoria-metrics:8428"
      - "-notifier.url=http://host.docker.internal:${CMDCLAW_ALERTMANAGER_PORT:-9093}"
      - "-evaluationInterval=30s"
      - "-rule.evalDelay=30s"
      - "-httpListenAddr=:8880"
    ports:
      - "${CMDCLAW_VMALERT_PORT:-8880}:8880"
    volumes:
      - ./observability/vmalert:/etc/vmalert:ro
    depends_on:
      - victoria-metrics
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  cmdclaw_victoria_metrics_data:
    name: ${CMDCLAW_VICTORIA_METRICS_VOLUME:-cmdclaw-local_cmdclaw_victoria_metrics_data}
  cmdclaw_victoria_logs_data:
    name: ${CMDCLAW_VICTORIA_LOGS_VOLUME:-cmdclaw-local_cmdclaw_victoria_logs_data}
  cmdclaw_victoria_traces_data:
    name: ${CMDCLAW_VICTORIA_TRACES_VOLUME:-cmdclaw-local_cmdclaw_victoria_traces_data}
