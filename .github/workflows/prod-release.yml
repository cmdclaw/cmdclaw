name: Production Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to release"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: release-tagging
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Resolve commit on main
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --force

          commit_sha="$(git rev-parse "${{ inputs.ref }}^{commit}")"
          git merge-base --is-ancestor "${commit_sha}" origin/main

          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

  db-push:
    needs: resolve
    uses: ./.github/workflows/db-push.yml
    with:
      ref: ${{ needs.resolve.outputs.commit_sha }}
      environment: prod
    secrets: inherit

  e2b-sandbox:
    needs: resolve
    uses: ./.github/workflows/e2b-sandbox.yml
    with:
      ref: ${{ needs.resolve.outputs.commit_sha }}
      environment: prod
    secrets: inherit

  create-tag:
    needs:
      - resolve
      - db-push
      - e2b-sandbox
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.commit_sha }}
          fetch-depth: 0

      - name: Compute next release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin --tags --force

          base_tag="v$(TZ=Europe/Dublin date +%Y.%-m.%-d)"
          next_tag="${base_tag}"
          base_exists=false
          max_suffix=-1

          if git rev-parse "${base_tag}" >/dev/null 2>&1; then
            base_exists=true
          fi

          while IFS= read -r tag_name; do
            suffix="${tag_name#${base_tag}-}"
            if [[ "${suffix}" =~ ^[0-9]+$ ]] && (( suffix > max_suffix )); then
              max_suffix="${suffix}"
            fi
          done < <(git tag -l "${base_tag}-*")

          if [[ "${base_exists}" == true || ${max_suffix} -ge 0 ]]; then
            next_tag="${base_tag}-$((max_suffix + 1))"
          fi

          echo "tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.tag.outputs.tag }}"
          commit_sha="${{ needs.resolve.outputs.commit_sha }}"

          git tag -a "${tag}" "${commit_sha}" -m "Release ${tag}"
          git push origin "refs/tags/${tag}"

      - name: Summarize release
        run: echo "Created release tag ${{ steps.tag.outputs.tag }} for ${{ needs.resolve.outputs.commit_sha }}" >> "$GITHUB_STEP_SUMMARY"
