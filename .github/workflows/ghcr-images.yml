name: Publish GHCR Images

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".dockerignore"
      - ".github/workflows/ghcr-images.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".dockerignore"
      - ".github/workflows/ghcr-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: cmdclaw-web
            dockerfile: apps/web/Dockerfile.app
          - image_name: cmdclaw-worker
            dockerfile: apps/worker/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Compute daily version tag
        id: daily-tag
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = process.env.PACKAGE_NAME;
            const today = new Date().toISOString().slice(0, 10).replace(/-/g, "");

            async function listVersionsForUser() {
              return github.paginate(
                "GET /users/{username}/packages/{package_type}/{package_name}/versions",
                {
                  username: owner,
                  package_type: "container",
                  package_name: packageName,
                  per_page: 100,
                },
              );
            }

            async function listVersionsForOrg() {
              return github.paginate(
                "GET /orgs/{org}/packages/{package_type}/{package_name}/versions",
                {
                  org: owner,
                  package_type: "container",
                  package_name: packageName,
                  per_page: 100,
                },
              );
            }

            async function listVersions() {
              try {
                return await listVersionsForUser();
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                try {
                  return await listVersionsForOrg();
                } catch (orgError) {
                  if (orgError.status === 404) {
                    return [];
                  }

                  throw orgError;
                }
              }
            }

            const versions = await listVersions();
            const tags = versions.flatMap(
              (version) => version.metadata?.container?.tags ?? [],
            );
            const suffixes = tags
              .filter((tag) => tag.startsWith(`${today}-`))
              .map((tag) => Number(tag.slice(today.length + 1)))
              .filter((value) => Number.isInteger(value));
            const nextSuffix =
              (suffixes.length === 0 ? 0 : Math.max(...suffixes)) + 1;

            core.setOutput("value", `${today}-${nextSuffix}`);
        env:
          PACKAGE_NAME: ${{ matrix.image_name }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/${{ matrix.image_name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=${{ steps.daily-tag.outputs.value }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          pull: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
