name: Create Release Tag

on:
  workflow_call:
    inputs:
      commit_sha:
        description: "Commit SHA to tag"
        required: true
        type: string
    outputs:
      commit_sha:
        description: "Resolved commit SHA"
        value: ${{ jobs.create-tag.outputs.commit_sha }}
      tag:
        description: "Created release tag"
        value: ${{ jobs.create-tag.outputs.tag }}
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to tag"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-tagging
  cancel-in-progress: false

jobs:
  create-tag:
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Resolve commit on main
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --tags --force

          commit_sha="$(git rev-parse "${{ inputs.commit_sha }}^{commit}")"
          git merge-base --is-ancestor "${commit_sha}" origin/main

          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

      - name: Compute next release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          base_tag="v$(TZ=Europe/Dublin date +%Y.%-m.%-d)"
          next_tag="${base_tag}"
          base_exists=false
          max_suffix=-1

          if git rev-parse "${base_tag}" >/dev/null 2>&1; then
            base_exists=true
          fi

          while IFS= read -r tag_name; do
            suffix="${tag_name#${base_tag}-}"
            if [[ "${suffix}" =~ ^[0-9]+$ ]] && (( suffix > max_suffix )); then
              max_suffix="${suffix}"
            fi
          done < <(git tag -l "${base_tag}-*")

          if [[ "${base_exists}" == true || ${max_suffix} -ge 0 ]]; then
            next_tag="${base_tag}-$((max_suffix + 1))"
          fi

          echo "tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push release tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.tag.outputs.tag }}"
          commit_sha="${{ steps.resolve.outputs.commit_sha }}"

          git tag -a "${tag}" "${commit_sha}" -m "Release ${tag}"
          git push origin "refs/tags/${tag}"
