name: Build E2B Sandbox

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/src/sandbox-templates/**"
      - "apps/web/package.json"
      - "package.json"
      - "bun.lock"
      - "turbo.json"
      - ".github/workflows/e2b-sandbox.yml"
  workflow_dispatch:

jobs:
  build-sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build E2B Sandbox
        env:
          E2B_ACCESS_TOKEN: ${{ secrets.E2B_API_KEY }}
        run: bun run --cwd apps/web e2b:build:prod
