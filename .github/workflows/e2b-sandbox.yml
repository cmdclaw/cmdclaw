name: Build E2B Sandbox

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        type: string
      environment:
        description: "Environment to target"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        default: "main"
      environment:
        description: "Environment to target"
        required: true
        type: choice
        default: "dev"
        options:
          - "dev"
          - "staging"
          - "prod"

jobs:
  build-sandbox:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build E2B Sandbox
        env:
          E2B_ACCESS_TOKEN: ${{ secrets.E2B_API_KEY }}
        run: bun run --cwd apps/sandbox e2b:build:${{ inputs.environment }}
