name: Push DB Schema

on:
  workflow_call:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        type: string
      environment:
        description: "Environment to target"
        required: true
        type: string
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: true
        default: "main"
      environment:
        description: "Environment to target"
        required: true
        type: choice
        default: "staging"
        options:
          - "staging"
          - "prod"

jobs:
  db-push:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Push DB changes
        env:
          DATABASE_URL_PROD: ${{ secrets.DATABASE_URL_PROD }}
          DATABASE_URL_STAGING: ${{ secrets.DATABASE_URL_STAGING }}
          SKIP_ENV_VALIDATION: "1"
        run: |
          case "${{ inputs.environment }}" in
            staging)
              export DATABASE_URL="${DATABASE_URL_STAGING}"
              ;;
            prod)
              export DATABASE_URL="${DATABASE_URL_PROD}"
              ;;
            *)
              echo "Unsupported environment: ${{ inputs.environment }}" >&2
              exit 1
              ;;
          esac

          if [ -z "${DATABASE_URL}" ]; then
            case "${{ inputs.environment }}" in
              staging)
                echo "Missing DATABASE_URL_STAGING secret" >&2
                ;;
              prod)
                echo "Missing DATABASE_URL_PROD secret" >&2
                ;;
            esac
            exit 1
          fi

          bun run db:push --strict
