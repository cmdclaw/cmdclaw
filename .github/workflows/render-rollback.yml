name: Roll Back Render Services

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to target"
        required: true
        type: string
      web_deploy_id:
        description: "Render web deploy ID to roll back to"
        required: true
        type: string
      worker_deploy_id:
        description: "Render worker deploy ID to roll back to"
        required: true
        type: string
      mcp_deploy_id:
        description: "Optional Render MCP deploy ID to roll back to"
        required: false
        type: string
        default: ""
    secrets:
      RENDER_API_KEY:
        required: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_WEB_SERVICE_NAME: cmdclaw-web-${{ inputs.environment }}
      RENDER_WORKER_SERVICE_NAME: cmdclaw-worker-${{ inputs.environment }}
      RENDER_MCP_SERVICE_NAME: cmdclaw-mcp-${{ inputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Validate Render configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          [ -n "${RENDER_API_KEY}" ] || missing+=("RENDER_API_KEY")

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing Render secret(s) for GitHub environment "%s": %s\n' \
              "${{ inputs.environment }}" "${missing[*]}" >&2
            printf 'Set these as secrets on the GitHub environment named "%s".\n' \
              "${{ inputs.environment }}" >&2
            exit 1
          fi

      - name: Roll back web
        run: bun scripts/release/render-deploy.ts rollback --service-name "${RENDER_WEB_SERVICE_NAME}" --deploy-id "${{ inputs.web_deploy_id }}"

      - name: Roll back worker
        run: bun scripts/release/render-deploy.ts rollback --service-name "${RENDER_WORKER_SERVICE_NAME}" --deploy-id "${{ inputs.worker_deploy_id }}"

      - name: Roll back MCP
        if: ${{ inputs.mcp_deploy_id != '' }}
        run: bun scripts/release/render-deploy.ts rollback --service-name "${RENDER_MCP_SERVICE_NAME}" --deploy-id "${{ inputs.mcp_deploy_id }}"
