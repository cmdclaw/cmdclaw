pre-commit:
  commands:
    secrets:
      run: gitleaks protect --staged --config .gitleaks.toml --redact
    lint:
      run: bun run --cwd apps/web lint
    typecheck:
      run: bun run check:web && bun run check:worker
    format:
      run: bun run --cwd apps/web format:write
      stage_fixed: true


pre-push:
  parallel: false
  commands:
    check:
      run: bun run check
    test:
      run: bun run test
    build:
      run: bun run build
      
