pre-commit:
  commands:
    secrets:
      run: gitleaks protect --staged --config .gitleaks.toml --redact
    lint:
      root: app
      run: bun run lint
    typecheck:
      root: app
      run: bun run typecheck
    format:
      root: app
      run: bun run format:write
      stage_fixed: true


pre-push:
  parallel: false
  commands:
    check:
      root: app
      run: bun run check
    test:
      root: app
      run: bun run test
    build:
      root: app
      run: bun run build
      
