name: cmdclaw-local

services:
  database:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: cmdclaw
    ports:
      - "${CMDCLAW_POSTGRES_PORT:-5433}:5432"
    volumes:
      - cmdclaw_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "${CMDCLAW_REDIS_PORT:-6380}:6379"
    volumes:
      - cmdclaw_redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    ports:
      - "${CMDCLAW_MINIO_API_PORT:-9100}:9000"
      - "${CMDCLAW_MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - cmdclaw_minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cmdclaw_postgres_data:
  cmdclaw_redis_data:
  cmdclaw_minio_data:
