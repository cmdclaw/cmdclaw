name: cmdclaw-selfhost

services:
  database:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: cmdclaw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - cmdclaw_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cmdclaw"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - cmdclaw_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - cmdclaw_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: ${CMDCLAW_WORKER_IMAGE:-ghcr.io/baptistecolle/cmdclaw-worker:main}
    env_file:
      - .env.selfhost
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["bun", "run", "--cwd", "/app/packages/db", "db:push"]
    restart: "no"

  app:
    image: ${CMDCLAW_APP_IMAGE:-ghcr.io/baptistecolle/cmdclaw-web:main}
    env_file:
      - .env.selfhost
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  worker:
    image: ${CMDCLAW_WORKER_IMAGE:-ghcr.io/baptistecolle/cmdclaw-worker:main}
    env_file:
      - .env.selfhost
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  cmdclaw_postgres_data:
  cmdclaw_redis_data:
  cmdclaw_minio_data:
