# Render Blueprint for a staging copy of the current Railway staging stack.
#
# Current mapping:
# - Render manages: web, worker, Postgres, Key Value, MinIO-backed S3, and the
#   staging observability stack (VictoriaMetrics, VictoriaLogs, VictoriaTraces,
#   Vector, Alertmanager, vmalert, and Grafana)
#
# Notes:
# - Keep secrets out of this blueprint and sync them from Infisical after the
#   resources exist. A Render environment group scoped to cmdclaw/staging is the
#   cleanest target because both web and worker can share the same secrets.
# - Render environment groups do not override service-level variables with the
#   same key, so any secrets provided by Infisical must not also be declared
#   directly on these services in this blueprint.
# - `APP_URL` and `NEXT_PUBLIC_APP_URL` should come from Infisical and point to
#   the Render hostname or your custom staging domain before testing auth/email
#   flows.
# - The MinIO service is public because presigned URLs must be reachable from the
#   browser. Your other Render services can still reach it over the private network.
# - Create the `cmdclaw-documents` bucket once after the first deploy.
# - The observability services stay on the private network. Operators reach them
#   through a dedicated private Caddy ingress that is exposed to the tailnet by
#   one Tailscale Serve worker, while the Tailscale subnet router defined below
#   still advertises the Render private `10.0.0.0/8` range for direct
#   private-network debugging. Web and worker export telemetry to Vector via
#   private-network host + port env vars

previews:
  generation: "off"

projects:
  - name: cmdclaw
    environments:
      - name: staging
        databases:
          - name: cmdclaw-postgres-staging
            region: frankfurt
            plan: basic-256mb
            postgresMajorVersion: "18"
            ipAllowList: []

        services:
          - type: keyvalue
            name: cmdclaw-redis-staging
            region: frankfurt
            plan: starter
            ipAllowList: []

          - type: web
            name: cmdclaw-s3-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/minio
            dockerfilePath: docker/images/minio/Dockerfile
            healthCheckPath: /minio/health/live
            disk:
              name: cmdclaw-s3-data
              mountPath: /data
              sizeGB: 10
            envVars:
              - key: PORT
                value: "10000"

          - type: worker
            name: cmdclaw-tailscale-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: off
            dockerContext: docker/images/tailscale
            dockerfilePath: docker/images/tailscale/Dockerfile
            disk:
              name: cmdclaw-tailscale-state
              mountPath: /var/lib/tailscale
              sizeGB: 1
            envVars:
              - key: TAILSCALE_AUTHKEY
                sync: false
              - key: TAILSCALE_VERSION
                value: 1.96.4
              - key: ADVERTISE_ROUTES
                value: 10.0.0.0/8

          - type: pserv
            name: cmdclaw-observability-caddy-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/caddy
            dockerfilePath: docker/images/caddy/Dockerfile
            envVars:
              - key: PORT
                value: "8080"
              - key: CMDCLAW_GRAFANA_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-grafana-staging
                  property: host
              - key: CMDCLAW_VICTORIA_METRICS_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-victoria-metrics-staging
                  property: host
              - key: CMDCLAW_VICTORIA_LOGS_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-victoria-logs-staging
                  property: host
              - key: CMDCLAW_VICTORIA_TRACES_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-victoria-traces-staging
                  property: host

          - type: worker
            name: cmdclaw-observability-tailnet-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            autoDeployTrigger: off
            dockerContext: docker/images/tailscale
            dockerfilePath: docker/images/tailscale/Dockerfile
            disk:
              name: cmdclaw-observability-tailnet-state
              mountPath: /var/lib/tailscale
              sizeGB: 1
            envVars:
              - key: TAILSCALE_AUTHKEY
                sync: false
              - key: TAILSCALE_VERSION
                value: 1.96.4
              - key: TAILSCALE_HOSTNAME
                value: cmdclaw-observability-staging
              - key: TAILSCALE_SERVE_TARGET_SCHEME
                value: http
              - key: TAILSCALE_SERVE_TARGET_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-observability-caddy-staging
                  property: host
              - key: TAILSCALE_SERVE_TARGET_PORT
                value: "8080"

          - type: pserv
            name: cmdclaw-victoria-metrics-staging
            runtime: image
            region: frankfurt
            plan: starter
            numInstances: 1
            image:
              url: victoriametrics/victoria-metrics:v1.140.0
            dockerCommand: /victoria-metrics-prod -storageDataPath=/victoria-metrics-data
            disk:
              name: cmdclaw-victoria-metrics-data
              mountPath: /victoria-metrics-data
              sizeGB: 2

          - type: pserv
            name: cmdclaw-victoria-logs-staging
            runtime: image
            region: frankfurt
            plan: starter
            numInstances: 1
            image:
              url: victoriametrics/victoria-logs:v1.48.0
            dockerCommand: /victoria-logs-prod -storageDataPath=/victoria-logs-data
            disk:
              name: cmdclaw-victoria-logs-data
              mountPath: /victoria-logs-data
              sizeGB: 2

          - type: pserv
            name: cmdclaw-victoria-traces-staging
            runtime: image
            region: frankfurt
            plan: starter
            numInstances: 1
            image:
              url: victoriametrics/victoria-traces:v0.8.0
            dockerCommand: /victoria-traces-prod -storageDataPath=/victoria-traces-data
            disk:
              name: cmdclaw-victoria-traces-data
              mountPath: /victoria-traces-data
              sizeGB: 2

          - type: pserv
            name: cmdclaw-vector-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/vector
            dockerfilePath: docker/images/vector/Dockerfile
            envVars:
              - key: CMDCLAW_VICTORIA_METRICS_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-victoria-metrics-staging
                  property: host
              - key: CMDCLAW_VICTORIA_LOGS_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-victoria-logs-staging
                  property: host
              - key: CMDCLAW_VICTORIA_TRACES_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-victoria-traces-staging
                  property: host

          - type: pserv
            name: cmdclaw-alertmanager-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/alertmanager
            dockerfilePath: docker/images/alertmanager/Dockerfile
            disk:
              name: cmdclaw-alertmanager-data
              mountPath: /alertmanager
              sizeGB: 1

          - type: pserv
            name: cmdclaw-vmalert-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/vmalert
            dockerfilePath: docker/images/vmalert/Dockerfile
            envVars:
              - key: CMDCLAW_VICTORIA_METRICS_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-victoria-metrics-staging
                  property: host
              - key: CMDCLAW_ALERTMANAGER_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-alertmanager-staging
                  property: host

          - type: pserv
            name: cmdclaw-grafana-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: docker/images/grafana
            dockerfilePath: docker/images/grafana/Dockerfile
            disk:
              name: cmdclaw-grafana-data
              mountPath: /var/lib/grafana
              sizeGB: 2
            envVars:
              - key: GF_AUTH_ANONYMOUS_ENABLED
                value: "false"
              - key: GF_AUTH_DISABLE_LOGIN_FORM
                value: "false"
              - key: GF_PLUGINS_PREINSTALL_SYNC
                value: victoriametrics-logs-datasource
              - key: CMDCLAW_VICTORIA_METRICS_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-victoria-metrics-staging
                  property: host
              - key: CMDCLAW_VICTORIA_LOGS_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-victoria-logs-staging
                  property: host
              - key: CMDCLAW_VICTORIA_TRACES_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-victoria-traces-staging
                  property: host
              - key: CMDCLAW_ALERTMANAGER_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-alertmanager-staging
                  property: host

          - type: web
            name: cmdclaw-web-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: .
            dockerfilePath: docker/images/web/Dockerfile
            dockerCommand: node ./node_modules/next/dist/bin/next start -H 0.0.0.0 -p 10000
            healthCheckPath: /api/health
            envVars:
              - key: PORT
                value: "10000"
              - key: DATABASE_URL
                fromDatabase:
                  name: cmdclaw-postgres-staging
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: cmdclaw-redis-staging
                  property: connectionString
              - key: AWS_ENDPOINT_URL
                fromService:
                  type: web
                  name: cmdclaw-s3-staging
                  envVarKey: RENDER_EXTERNAL_URL
              - key: AWS_DEFAULT_REGION
                value: us-east-1
              - key: AWS_S3_BUCKET_NAME
                value: cmdclaw-documents
              - key: AWS_S3_FORCE_PATH_STYLE
                value: "true"
              - key: CMDCLAW_VECTOR_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-vector-staging
                  property: host
              - key: CMDCLAW_VECTOR_LOG_PORT
                value: "8686"
              - key: CMDCLAW_VECTOR_OTLP_HTTP_PORT
                value: "4318"
              - key: SANDBOX_AGENT_RUNTIME
                value: opencode
              - key: SANDBOX_DEFAULT
                value: daytona
              - key: E2B_DAYTONA_SANDBOX_NAME
                value: cmdclaw-agent-staging

          - type: worker
            name: cmdclaw-worker-staging
            runtime: docker
            region: frankfurt
            plan: starter
            numInstances: 1
            dockerContext: .
            dockerfilePath: docker/images/worker/Dockerfile
            dockerCommand: bun dist/index.js
            envVars:
              - key: DATABASE_URL
                fromDatabase:
                  name: cmdclaw-postgres-staging
                  property: connectionString
              - key: REDIS_URL
                fromService:
                  type: keyvalue
                  name: cmdclaw-redis-staging
                  property: connectionString
              - key: AWS_ENDPOINT_URL
                fromService:
                  type: web
                  name: cmdclaw-s3-staging
                  envVarKey: RENDER_EXTERNAL_URL
              - key: AWS_DEFAULT_REGION
                value: us-east-1
              - key: AWS_S3_BUCKET_NAME
                value: cmdclaw-documents
              - key: AWS_S3_FORCE_PATH_STYLE
                value: "true"
              - key: CMDCLAW_VECTOR_HOST
                fromService:
                  type: pserv
                  name: cmdclaw-vector-staging
                  property: host
              - key: CMDCLAW_VECTOR_LOG_PORT
                value: "8686"
              - key: CMDCLAW_VECTOR_OTLP_HTTP_PORT
                value: "4318"
              - key: SANDBOX_AGENT_RUNTIME
                value: opencode
              - key: SANDBOX_DEFAULT
                value: daytona
              - key: E2B_DAYTONA_SANDBOX_NAME
                value: cmdclaw-agent-staging
